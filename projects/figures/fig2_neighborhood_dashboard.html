const nbSelect = document.getElementById("neighborhood");
const decSelect = document.getElementById("decade");
const summaryDiv = document.getElementById("summary");

function addOptions(select, values, labelFunc) {
  select.innerHTML = "";
  values.forEach(v => {
    const option = document.createElement("option");
    option.value = v;
    option.textContent = labelFunc ? labelFunc(v) : v;
    select.appendChild(option);
  });
}

function updateDecadeOptions() {
  const nb = nbSelect.value;
  addOptions(decSelect, decadesByNeighborhood[nb] || [], v => String(v) + "s");
}

function updatePlots() {
  const nb = nbSelect.value;
  const dec = decSelect.value;
  const key = nb + "||" + dec;
  const counts = decadeCounts[nb] || {x: [], y: []};
  const geo = geoData[key] || {lon: [], lat: [], title: [], location: [], year: []};
  const sum = summaries[key] || {records: 0, geo_records: 0, unique_titles: 0, unique_locations: 0};

  summaryDiv.innerHTML =
    "<b>Selected neighborhood:</b> " + nb + "<br>" +
    "<b>Selected decade:</b> " + dec + "s<br>" +
    "<b>Records in selected decade:</b> " + sum.records + "<br>" +
    "<b>Records with coordinates:</b> " + sum.geo_records + "<br>" +
    "<b>Unique titles:</b> " + sum.unique_titles + "<br>" +
    "<b>Unique filming locations:</b> " + sum.unique_locations;

  Plotly.react("bar", [{
    type: "bar",
    x: counts.x,
    y: counts.y,
    hovertemplate: "Decade=%{x}<br>Records=%{y}<extra></extra>"
  }], {
    title: "Records by Decade: " + nb,
    xaxis: { title: "Decade" },
    yaxis: { title: "Records" },
    margin: {l: 55, r: 20, t: 60, b: 55}
  }, {responsive: true});

  const hoverText = geo.title.map((t, i) =>
    "<b>" + t + "</b><br>" +
    "Year: " + geo.year[i] + "<br>" +
    "Location: " + geo.location[i] + "<br>" +
    "Lon: " + geo.lon[i].toFixed(4) + "<br>" +
    "Lat: " + geo.lat[i].toFixed(4)
  );

  const hasPoints = geo.lat.length > 0 && geo.lon.length > 0;
  const centerLat = hasPoints ? geo.lat.reduce((a, b) => a + b, 0) / geo.lat.length : 37.7749;
  const centerLon = hasPoints ? geo.lon.reduce((a, b) => a + b, 0) / geo.lon.length : -122.4194;

  function getZoom(lats, lons) {
    if (!lats.length || lats.length === 1) return 12;
    const latRange = Math.max(...lats) - Math.min(...lats);
    const lonRange = Math.max(...lons) - Math.min(...lons);
    const maxRange = Math.max(latRange, lonRange);
    if (maxRange < 0.005) return 14;
    if (maxRange < 0.015) return 13;
    if (maxRange < 0.04) return 12;
    if (maxRange < 0.08) return 11;
    return 10;
  }

  Plotly.react("scatter", [{
    type: "scattermap",
    mode: "markers",
    lon: geo.lon,
    lat: geo.lat,
    text: hoverText,
    hovertemplate: "%{text}<extra></extra>",
    marker: { size: 10, opacity: 0.78 }
  }], {
    title: "Selected Locations Map: " + nb + ", " + dec + "s",
    map: {
      style: "open-street-map",
      center: { lat: centerLat, lon: centerLon },
      zoom: getZoom(geo.lat, geo.lon)
    },
    margin: {l: 0, r: 0, t: 60, b: 0}
  }, {responsive: true});
}

addOptions(nbSelect, neighborhoods);
updateDecadeOptions();
updatePlots();
nbSelect.addEventListener("change", () => { updateDecadeOptions(); updatePlots(); });
decSelect.addEventListener("change", updatePlots);
</script>
